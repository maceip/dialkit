<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DialKit Dev Session</title>
    <style>
      body { font: 12px/1.4 system-ui, sans-serif; margin: 12px; width: 220px; }
      label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
      input[type="text"] { width: 100%; box-sizing: border-box; padding: 6px 8px; }
      p { color: #666; margin: 0 0 10px; }
    </style>
  </head>
  <body>
    <label><input id="enabled" type="checkbox" /> Enable on all pages</label>
    <label>Project key <input id="project" type="text" value="extension" /></label>
    <p>Right-click any element to leave notes or edit styles. Works without app instrumentation.</p>
    <script src="popup.js"></script>
  </body>
</html>
