<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DialKit Dev Session</title>
    <style>
      body {
        font: 12px/1.45 system-ui, sans-serif;
        margin: 0;
        padding: 14px;
        width: 260px;
        color: #111;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      label {
        display: block;
        margin-bottom: 10px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        margin-top: 4px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      #status {
        margin: 0 0 10px;
        color: #666;
        min-height: 1.4em;
      }
      p {
        color: #666;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <h1>DialKit Dev Session</h1>
    <p id="status">Loading…</p>
    <label class="row">
      <input id="enabled" type="checkbox" />
      Enable on all pages
    </label>
    <label>
      Project key
      <input id="project" type="text" value="extension" />
    </label>
    <p>Right-click any element to leave notes or edit styles.</p>
    <script src="popup.js"></script>
  </body>
</html>
